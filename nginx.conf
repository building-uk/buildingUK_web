server {
    listen 80;
    server_name _;

    # Frontend - SPA routing
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Sanity Studio - SPA routing
    location /studio {
        alias /usr/share/nginx/html/studio;
        index index.html;
        try_files $uri $uri/ /studio/index.html;
    }
}
